<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Plan Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="top">
  <div class="title">
    <h1>Meal Plan Builder</h1>
    <div class="sub">Import • Filter • Build • Save locally</div>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="recipes">Recipes</button>
</nav>

<main class="wrap">

<section class="tabPanel active" id="tab_recipes">

  <div class="panelGrid">

    <!-- IMPORT COLUMN -->
    <section class="card">
      <h2 class="mt0">Import Recipes</h2>

      <div class="row2 mt10">
        <div>
          <label>Cuisine</label>
          <select id="importArea">
            <option>Indian</option>
            <option>Mexican</option>
            <option>Thai</option>
            <option>Italian</option>
            <option>Chinese</option>
            <option>Japanese</option>
            <option>Greek</option>
            <option>French</option>
          </select>
        </div>
        <div>
          <label>Count</label>
          <select id="importCount">
            <option>10</option>
            <option selected>25</option>
            <option>50</option>
          </select>
        </div>
      </div>

      <div class="split mt12">
        <button class="primary" id="btnImport">Import Meals</button>
      </div>

      <div id="importStatus" class="hint mt10"></div>

      <div class="divider mt16"></div>

      <h2 class="mt16">Import Filters</h2>

      <label class="check mt10">
        <input type="checkbox" id="importUseProfile" checked>
        Apply Profile Filters
      </label>

      <div class="row3 mt10">
        <div>
          <label>Protein Min</label>
          <input id="i_pro_min" type="number" placeholder="0">
        </div>
        <div>
          <label>Carbs Min</label>
          <input id="i_car_min" type="number" placeholder="0">
        </div>
        <div>
          <label>Fat Min</label>
          <input id="i_fat_min" type="number" placeholder="0">
        </div>
      </div>

      <div class="split mt12">
        <button id="btnApplyImportFilters">Apply Import Filters</button>
        <button id="btnSaveVisibleImports">Save Visible</button>
        <button id="btnSaveAllImports">Save All</button>
      </div>

      <div class="divider mt16"></div>

      <h2 class="mt16">Import Results</h2>
      <div id="importResults" class="list mt10"></div>
    </section>

    <!-- LOCAL LIBRARY COLUMN -->
    <section class="card">
      <h2 class="mt0">Local Library</h2>

      <label class="check mt10">
        <input type="checkbox" id="localUseProfile" checked>
        Apply Profile Filters
      </label>

      <label class="mt12">Search</label>
      <input id="search" placeholder="Search by name, ingredient, tag">

      <div class="row3 mt10">
        <div>
          <label>Protein Min</label>
          <input id="l_pro_min" type="number" placeholder="0">
        </div>
        <div>
          <label>Carbs Min</label>
          <input id="l_car_min" type="number" placeholder="0">
        </div>
        <div>
          <label>Fat Min</label>
          <input id="l_fat_min" type="number" placeholder="0">
        </div>
      </div>

      <div class="split mt12">
        <button id="btnApplyLocalFilters">Apply Local Filters</button>
        <button id="btnClearLocalFilters">Clear Filters</button>
      </div>

      <div class="divider mt16"></div>

      <h2 class="mt16">Add Recipe</h2>

      <label class="mt10">Recipe Name</label>
      <input id="r_name" placeholder="Chicken Bowl">

      <div class="row3 mt10">
        <div><input id="r_cal" type="number" placeholder="Calories"></div>
        <div><input id="r_pro" type="number" placeholder="Protein"></div>
        <div><input id="r_car" type="number" placeholder="Carbs"></div>
      </div>

      <div class="row2 mt10">
        <div><input id="r_fat" type="number" placeholder="Fat"></div>
        <div>
          <label>Ingredients</label>
          <textarea id="r_ing" placeholder="1 cup rice&#10;200g chicken"></textarea>
        </div>
      </div>

      <div class="split mt12">
        <button class="primary" id="btnSaveRecipe">Save Recipe</button>
      </div>

      <div class="divider mt16"></div>

      <h2 class="mt16">Recipes</h2>
      <div id="recipes" class="list mt10"></div>
    </section>

  </div>

</section>

</main>

<script src="app.js"></script>
</body>
</html>
