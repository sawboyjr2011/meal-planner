
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meal Plan Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; padding:0; background:#0f0f12; color:#f2f2f2; }
    header { padding:16px; background:#16161c; font-weight:600; font-size:18px; }
    .tabs { display:flex; border-bottom:1px solid #222; background:#16161c; }
    .tab { padding:14px 16px; cursor:pointer; border-bottom:2px solid transparent; }
    .tab.active { border-color:#4f8cff; }
    .tabPanel { display:none; padding:20px; }
    .tabPanel.active { display:block; }
    .card { background:#1b1b22; padding:16px; border-radius:8px; margin-bottom:16px; }
    .panelGrid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
    input, select, textarea, button { width:100%; padding:8px; margin-top:6px; margin-bottom:10px; background:#101014; border:1px solid #2b2b35; color:#fff; border-radius:6px; }
    button { cursor:pointer; }
    button.primary { background:#4f8cff; border:none; }
    button.danger { background:#c74848; border:none; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .list .item { padding:12px; background:#121218; border-radius:6px; margin-bottom:8px; }
    .meta span { margin-right:12px; font-size:13px; }
    .hint { font-size:13px; opacity:0.6; }
    .warn { color:#ffcc66; }
    @media(max-width:900px){
      .panelGrid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<header>Meal Plan Builder</header>

<div class="tabs">
  <div class="tab active" data-tab="recipes">Recipes</div>
</div>

<section class="tabPanel active" id="tab_recipes">

  <div class="panelGrid">

    <!-- IMPORT COLUMN -->
    <section class="card">
      <h2>Import Recipes</h2>

      <div class="row2">
        <div>
          <label>Cuisine</label>
          <select id="importArea">
            <option>Indian</option>
            <option>Mexican</option>
            <option>Thai</option>
            <option>Italian</option>
            <option>Chinese</option>
            <option>Japanese</option>
            <option>Greek</option>
            <option>French</option>
          </select>
        </div>
        <div>
          <label>Count</label>
          <select id="importCount">
            <option>10</option>
            <option selected>25</option>
            <option>50</option>
          </select>
        </div>
      </div>

      <button class="primary" id="btnImport">Import Meals</button>
      <div id="importStatus" class="hint"></div>

      <h3>Import Filters</h3>
      <label><input type="checkbox" id="importUseProfile" checked> Apply Profile Filters</label>

      <div class="row3">
        <div><label>Protein Min</label><input id="i_pro_min" type="number"></div>
        <div><label>Carbs Min</label><input id="i_car_min" type="number"></div>
        <div><label>Fat Min</label><input id="i_fat_min" type="number"></div>
      </div>

      <button id="btnApplyImportFilters">Apply Import Filters</button>
      <button id="btnSaveVisibleImports">Save Visible</button>
      <button id="btnSaveAllImports">Save All</button>

      <h3>Import Results</h3>
      <div id="importResults" class="list"></div>
    </section>

    <!-- LOCAL LIBRARY COLUMN -->
    <section class="card">
      <h2>Local Library</h2>

      <label><input type="checkbox" id="localUseProfile" checked> Apply Profile Filters</label>

      <input id="search" placeholder="Search">

      <div class="row3">
        <div><label>Protein Min</label><input id="l_pro_min" type="number"></div>
        <div><label>Carbs Min</label><input id="l_car_min" type="number"></div>
        <div><label>Fat Min</label><input id="l_fat_min" type="number"></div>
      </div>

      <button id="btnApplyLocalFilters">Apply Local Filters</button>
      <button id="btnClearLocalFilters">Clear Filters</button>

      <h3>Add Recipe</h3>
      <input id="r_name" placeholder="Recipe Name">
      <div class="row3">
        <input id="r_cal" type="number" placeholder="Calories">
        <input id="r_pro" type="number" placeholder="Protein">
        <input id="r_car" type="number" placeholder="Carbs">
      </div>
      <div class="row3">
        <input id="r_fat" type="number" placeholder="Fat">
        <textarea id="r_ing" placeholder="Ingredients (one per line)"></textarea>
      </div>

      <button class="primary" id="btnSaveRecipe">Save Recipe</button>

      <h3>Recipes</h3>
      <div id="recipes" class="list"></div>
    </section>

  </div>

</section>

<script src="app.js"></script>
</body>
</html>
